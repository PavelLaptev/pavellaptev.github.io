<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script>
      (function () {
        var t = localStorage.getItem("theme");
        if (t === "dark" || t === "light") {
          document.documentElement.setAttribute("data-theme", t);
        } else {
          document.documentElement.setAttribute(
            "data-theme",
            window.matchMedia("(prefers-color-scheme: dark)").matches
              ? "dark"
              : "light"
          );
        }
      })();
    </script>
    <link rel="icon" type="image/png" href="/fav.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Pavel Laptev — digital designer based in Berlin. Love design, open source and contribute to community."
    />
    <title>Pavel Laptev — Digital Designer</title>
    <script
      defer
      src="https://cloud.umami.is/script.js"
      data-website-id="95f090c0-7e8a-4676-a4cb-272574f8dd9e"
    ></script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
